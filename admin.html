<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding-top:50px;
}
.box{
background:white;
padding:30px;
border-radius:20px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
li{
margin:8px 0;
}
h2{text-align:center;}
</style>
</head>

<body>

<div class="box">
<h2>Admin Panel</h2>
<ul id="list"></ul>
</div>

<script>
const users = JSON.parse(localStorage.getItem("users") || "[]");
const ul = document.getElementById("list");

users.forEach(u => {
    const li = document.createElement("li");
    li.textContent = u.first + " " + u.last;
    ul.appendChild(li);
});
</script>

</body>
</html>
